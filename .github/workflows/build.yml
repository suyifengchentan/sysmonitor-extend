name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx vsce package -o sysmonitor.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: sysmonitor
          path: sysmonitor.vsix
          retention-days: 30
